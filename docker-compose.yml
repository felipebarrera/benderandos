services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: benderandos_app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      DB_HOST: db
      REDIS_HOST: redis
    command: php artisan serve --host=0.0.0.0 --port=8000

  db:
    image: postgres:16
    container_name: benderandos_pg
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: benderand
      POSTGRES_PASSWORD: benderand123
      POSTGRES_DB: benderand
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: benderandos_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  pgdata:
